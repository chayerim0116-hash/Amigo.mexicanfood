<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMIGO — Footer</title>
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <footer class="footer">
    <div class="footer-inner">

      <!-- 왼쪽: 로고 -->
      <div class="footer-logo">
        <img src="../food/logo.footer.png" alt="AMIGO 로고">
      </div>

      <!-- 가운데: 회사 정보 -->
      <div class="footer-info">

        <!-- 1번째 줄 -->
        <p>
          <a href="#" class="footer-link">개인정보취급방침</a>
          <span class="sep">|</span>
          <a href="#" class="footer-link">이용약관</a>
          <span class="sep">|</span>
          대표전화.<span class="highlight"> 010-1234-4567</span>
          <span class="sep">|</span>
          홈페이지문의. 010-1234-4567
        </p>

        <!-- 2번째 줄 -->
        <p>
          AMIGO
          <span class="sep">|</span>
          대표 홍길동
          <span class="sep">|</span>
          사업자번호 123-45-7891
          <span class="sep">|</span>
          주소 서울시 강남구
          <span class="sep">|</span>
          고객정보책임담당자 홍길동
        </p>

        <!-- 3번째 줄: 저작권 -->
        <p class="footer-copyright">
          COPYRIGHT 2026 AMIGO. ALL RIGHTS RESERVED.
        </p>

      </div>

      <!-- 오른쪽: 아이콘 -->
      <div class="footer-icons">

        <!-- 고객센터 아이콘 -->
        <a href="#" class="footer-icon-btn" aria-label="고객센터">
          <img src="../food/header/icon3.svg" alt="고객센터">
        </a>

        <!-- 인스타그램 아이콘 -->
        <a href="#" class="footer-icon-btn" aria-label="인스타그램">
          <img src="../food/header/icon2.svg" alt="인스타그램">
        </a>

      </div>

    </div>
  </footer>

</body>
</html>
